name: Pull Request Validation

on:
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HTMLHint
        run: npm install -g htmlhint

      - name: Lint HTML files
        run: |
          echo "Running HTMLHint with custom rules..."
          htmlhint index.html contact.html legal.html --config .htmlhintrc || true
          echo "HTML linting completed."

      - name: Basic file presence check
        run: |
          echo "Verifying core files exist..."
          ls -la index.html contact.html legal.html
          echo "All core files present."