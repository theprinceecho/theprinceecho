name: Pull Request Validation

on:
  pull_request:
    branches: [ main ]

jobs:
  lint-and-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install -g htmlhint serve wait-on

      - name: Lint HTML files
        run: htmlhint index.html contact.html legal.html --config .htmlhintrc

      - name: Serve site
        run: npx serve . -l 8080 &

      - name: Wait for server
        run: npx wait-on http://localhost:8080 --timeout 10000

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: './lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Basic file validation
        run: ls -la index.html contact.html legal.html