<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ThePrinceEcho • A quiet temple for those who sense the urge</title>
    <meta name="description" content="A sovereign threshold for those who sense the urge. Calm, high-signal reflections on macro cycles, sovereignty, and the quiet convergence of human intelligence with advancing technology.">
    
    <link rel="canonical" href="https://theprinceecho.com">
    <meta name="robots" content="index, follow">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #050505;
            color: #d4af77;
            min-height: 100vh;
        }
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
        }
        .recent-grid {
            display: flex;
            flex-direction: column;
            gap: 48px;
            max-width: 720px;
            margin: 0 auto;
        }
        .transmission-card {
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: rgba(17,17,17,0.6);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(212,175,119,0.15);
        }
        @media (min-width: 768px) {
            .transmission-card {
                flex-direction: row;
            }
        }
        .essay-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }
        @media (min-width: 768px) {
            .essay-image {
                width: 280px;
                height: 100%;
            }
        }
        .card-content {
            padding: 24px;
            flex: 1;
        }
        .card-content h3 {
            font-size: 1.45rem;
            margin-bottom: 8px;
            line-height: 1.3;
        }
        .card-content p {
            opacity: 0.9;
            line-height: 1.65;
        }
    </style>
</head>
<body>

</html>
