<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ThePrinceEcho</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
       
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100dvh;
            min-height: 100dvh;
            min-height: -webkit-fill-available;
            background: #050505;
            color: #d4af77;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }
        .logo-container {
            margin-bottom: 36px;
        }
        .logo {
            width: 275px;
            height: 275px;
            border-radius: 24px;
            box-shadow: 0 0 75px rgba(212, 175, 119, 0.65);
        }
        h1 {
            font-size: 2.85rem;
            font-weight: 600;
            margin: 20px 0 14px 0;
            letter-spacing: -1px;
            text-shadow: 0 0 20px rgba(212, 175, 119, 0.6);
        }
        .subtitle {
            font-size: 1.18rem;
            opacity: 0.88;
            max-width: 340px;
            margin-bottom: 50px;
        }
        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(212, 175, 119, 0.08);
            color: #d4af77;
            border: 1px solid rgba(212, 175, 119, 0.4);
            border-radius: 50px;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 500;
            text-decoration: none;
            margin-bottom: 18px;
            box-shadow: 0 0 45px rgba(212, 175, 119, 0.5);
            transition: all 0.3s ease;
            width: 280px;
        }
        .button:hover {
            background: rgba(212, 175, 119, 0.12);
            box-shadow: 0 0 60px rgba(212, 175, 119, 0.65);
            transform: translateY(-2px);
        }
        .button img {
            width: 26px;
            height: 26px;
            border-radius: 4px;
        }
        .footer {
            margin-top: 70px;
            font-size: 0.95rem;
            opacity: 0.75;
            letter-spacing: 0.8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .footer img {
            width: 22px;
            height: 22px;
            filter: brightness(1.2);
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="https://raw.githubusercontent.com/theprinceecho/theprinceecho/main/TPE_Logo_final.JPG" alt="theprinceecho" class="logo">
    </div>
   
    <h1>ThePrinceEcho</h1>
    <p class="subtitle">The bridge for those who sense the urge.</p>
   
    <!-- X Button -->
    <a href="https://x.com/theprinceecho" target="_blank" class="button">
        <img src="https://raw.githubusercontent.com/theprinceecho/theprinceecho/main/IMG_1126.jpg" alt="X">
        @theprinceecho
    </a>

    <!-- Substack Button -->
    <a href="https://theprinceecho.substack.com" target="_blank" class="button">
        <img src="https://raw.githubusercontent.com/theprinceecho/theprinceecho/main/Substack.png" alt="Substack">
        Substack
    </a>
   
    <div class="footer">
        The sovereign landing page
        <img src="https://raw.githubusercontent.com/theprinceecho/theprinceecho/main/diamond_glow.JPG" alt="Diamond">
        The sovereign bridge
    </div>
</body>
</html>
