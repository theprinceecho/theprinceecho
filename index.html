<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThePrinceEcho</title>
  <style>
    :root {
      --color-bg: #0a0a0a;
      --color-accent: #d4af37;
      --color-text: #c5b8a0;
      --color-text-secondary: #c5b8a0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--color-bg);
      color: var(--color-text);
      font-family: Inter, system_ui, sans-serif;
      line-height: 1.6;
    }

    /* Navigation */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(10, 10, 10, 0.9);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(212, 175, 55, 0.08);
    }

    .nav__container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav__logo {
      display: flex;
      align-items: center;
      transition: opacity 0.2s ease;
    }

    .nav__logo:hover {
      opacity: 0.85;
    }

    .nav__logo img {
      display: block;
      border-radius: 4px;
    }

    .nav__links {
      display: flex;
      gap: 2.25rem;
      align-items: center;
    }

    .nav__link {
      color: var(--color-text-secondary);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      position: relative;
      padding-bottom: 4px;
      transition: color 0.2s ease;
    }

    .nav__link:hover {
      color: var(--color-accent);
    }

    .nav__link.active {
      color: var(--color-accent);
    }

    .nav__link.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 1px;
      background-color: var(--color-accent);
    }

    /* Hero Section */
    .hero {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6rem 1.5rem 4rem;
      position: relative;
      background: radial-gradient(
        circle at center,
        #111111 0%,
        #0a0a0a 65%,
        #0a0a0a 100%
      );
    }

    .hero__content {
      max-width: 720px;
      text-align: center;
      z-index: 1;
    }

    .hero__emblem {
      margin-bottom: 2.25rem;
    }

    .hero__logo {
      width: 100%;
      max-width: 420px;
      height: auto;
      filter: drop-shadow(0 15px 35px rgba(0, 0, 0, 0.5));
    }

    .hero__title {
      font-size: clamp(2.8rem, 8vw, 4.8rem);
      font-weight: 600;
      color: var(--color-accent);
      margin-bottom: 1rem;
      letter-spacing: -0.025em;
      line-height: 1.05;
    }

    .hero__tagline {
      font-size: clamp(1.15rem, 3.2vw, 1.4rem);
      color: var(--color-text-secondary);
      max-width: 540px;
      margin: 0 auto 2.75rem;
      line-height: 1.55;
    }

    .hero__actions {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 1rem 2.5rem;
      border-radius: 9999px;
      font-size: 1rem;
      text-decoration: none;
      transition: all 0.2s ease;
      min-width: 240px;
      font-weight: 500;
    }

    .btn--primary {
      background-color: var(--color-accent);
      color: #111111;
      font-weight: 600;
    }

    .btn--secondary {
      background-color: transparent;
      color: var(--color-accent);
      border: 1px solid var(--color-accent);
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }
  </style>
</head>
<body>

  <!-- Navigation / Header -->
  <nav class="nav">
    <div class="nav__container">
      <a href="#home" class="nav__logo" aria-label="ThePrinceEcho Home">
        <img src="TPE_Logo_final.webp" alt="ThePrinceEcho" width="32" height="32">
      </a>

      <div class="nav__links">
        <a href="#home" class="nav__link active">Home</a>
        <a href="#about" class="nav__link">About</a>
        <a href="#recent-transmissions" class="nav__link">Recent Transmissions</a>
      </div>
    </div>
  </nav>

  <!-- Hero / Home Section -->
  <section id="home" class="hero">
    <div class="hero__content">
      <div class="hero__emblem">
        <img 
          src="TPE_Logo_final.webp" 
          alt="ThePrinceEcho Emblem" 
          class="hero__logo"
          width="420" 
          height="420"
          loading="eager"
        >
      </div>

      <h1 class="hero__title">ThePrinceEcho</h1>

      <p class="hero__tagline">
        A quiet temple for those who sense the urge.
      </p>

      <div class="hero__actions">
        <a href="https://x.com/theprinceecho" class="btn btn--primary" target="_blank" rel="noopener">
          Follow on X
        </a>
        <a href="https://theprinceecho.substack.com" class="btn btn--secondary" target="_blank" rel="noopener">
          Read on Substack
        </a>
      </div>
    </div>
  </section>

</body>
</html>
