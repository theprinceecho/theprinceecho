<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThePrinceEcho</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            min-height: 100dvh;           /* fixes white bars on mobile */
            background: radial-gradient(circle at center, #0a0a0a 0%, #050505 65%, #020202 100%);
            color: #d4af77;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .logo-container {
            margin-bottom: 36px;
        }

        .logo {
            width: 275px;
            height: 275px;
            border-radius: 24px;
            box-shadow: 0 0 75px rgba(212, 175, 119, 0.65);
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.04);
        }

        h1 {
            font-size: 2.85rem;
            font-weight: 600;
            margin: 20px 0 14px 0;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1.18rem;
            opacity: 0.88;
            max-width: 340px;
            margin: 0 auto 42px auto;
            line-height: 1.45;
        }

        .button {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            background: transparent;
            color: #d4af77;
            border: 2px solid #d4af77;
            border-radius: 50px;
            padding: 18px 38px;
            font-size: 1.15rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 45px rgba(212, 175, 119, 0.5);
        }

        .button:hover {
            background: rgba(212, 175, 119, 0.12);
            transform: translateY(-2px);
            box-shadow: 0 0 60px rgba(212, 175, 119, 0.65);
        }

        .button img {
            width: 26px;
            height: 26px;
        }

        .footer {
            margin-top: 70px;
            font-size: 0.95rem;
            opacity: 0.65;
            letter-spacing: 0.6px;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="https://raw.githubusercontent.com/theprinceecho/theprinceecho/main/TPE_Logo_final.JPG" 
             alt="ThePrinceEcho" class="logo">
    </div>
    
    <h1>ThePrinceEcho</h1>
    <p class="subtitle">The bridge for those who sense the urge.</p>
    
    <a href="https://x.com/theprinceecho" target="_blank" class="button">
        <img src="https://raw.githubusercontent.com/theprinceecho/theprinceecho/main/IMG_1126.jpg" 
             alt="X">
        @theprinceecho
    </a>
    
    <div class="footer">
        Sovereign landing page • The bridge
    </div>
</body>
</html>
