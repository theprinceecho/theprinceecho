<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ThePrinceEcho</title>
    <meta name="description" content="The bridge for those who sense the urge.">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background: #050505;
            color: #d4af77;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow-x: hidden;
        }

        .logo-container {
            margin-bottom: 32px;
        }
        .logo {
            width: 280px;
            height: 280px;
            border-radius: 24px;
            box-shadow: 0 0 65px rgba(212, 175, 119, 0.65);
        }

        h1 {
            font-size: 2.45rem;
            font-weight: 600;
            margin: 18px 0 12px 0;
            letter-spacing: -1px;
            text-shadow: 0 0 20px rgba(212, 175, 119, 0.6);
        }

        .subtitle {
            font-size: 1.08rem;
            opacity: 0.88;
            max-width: 340px;
            margin: 0 auto 36px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(212, 175, 119, 0.08);
            color: #d4af77;
            padding: 16px 32px;
            border-radius: 9999px;
            font-size: 1.1rem;
            font-weight: 500;
            text-decoration: none;
            margin-bottom: 18px;
            min-width: 280px;
            justify-content: center;
            box-shadow: 0 0 45px rgba(212, 175, 119, 0.4);
            transition: all 0.3s ease;
        }
        .button:hover {
            background: rgba(212, 175, 119, 0.12);
            box-shadow: 0 0 60px rgba(212, 175, 119, 0.65);
        }

        .footer {
            margin-top: 80px;
            font-size: 0.95rem;
            opacity: 0.75;
            letter-spacing: 0.8px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .footer img {
            width: 22px;
            height: 22px;
            filter: brightness(1.2);
        }

        /* Copyright section — doubled breathing room */
        .copyright {
            margin-top: 80px;          /* doubled from previous */
            padding-bottom: 40px;
            font-size: 0.9rem;
            opacity: 0.6;
            letter-spacing: 0.6px;
            line-height: 2;            /* doubled line spacing */
        }

        @media (max-width: 480px) {
            .logo { width: 250px; height: 250px; }
            h1 { font-size: 2.1rem; }
            .button { min-width: 260px; font-size: 1rem; }
            .footer { margin-top: 60px; }
            .copyright { margin-top: 70px; padding-bottom: 30px; }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="https://raw.githubusercontent.com/theprinceecho/theprinceecho/main/TPE_Logo_final.jpg" 
             alt="theprinceecho" class="logo">
    </div>
   
    <h1>ThePrinceEcho</h1>
    <p class="subtitle">The bridge for those who sense the urge.</p>
   
    <a href="https://x.com/theprinceecho" target="_blank" class="button">
        <img src="https://raw.githubusercontent.com/theprinceecho/theprinceecho/main/IMG_1126.jpg" alt="X">
        @theprinceecho
    </a>
   
    <a href="https://theprinceecho.substack.com" target="_blank" class="button">
        <img src="https://raw.githubusercontent.com/theprinceecho/theprinceecho/main/Substack.png" alt="Substack Journal">
        Substack Journal
    </a>
   
    <div class="footer">
        The sovereign landing page
        <img src="https://raw.githubusercontent.com/theprinceecho/theprinceecho/main/diamond_glow.JPG" alt="Diamond">
        The sovereign bridge
        • Impressum • Contact
    </div>

    <div class="copyright">
        Copyright © 2026 ThePrinceEcho. All rights reserved.
    </div>
</body>
</html>
