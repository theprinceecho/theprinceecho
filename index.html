<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThePrinceEcho</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            color: #d4af77;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .logo-container {
            margin-bottom: 40px;
        }

        .logo {
            width: 220px;          /* ← bigger logo */
            height: 220px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(212, 175, 119, 0.35);
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.04);
        }

        h1 {
            font-size: 2.85rem;
            font-weight: 600;
            margin: 20px 0 14px 0;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1.18rem;
            opacity: 0.88;
            max-width: 340px;
            margin: 0 auto 42px auto;
            line-height: 1.45;
        }

        .button {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            background: transparent;
            color: #d4af77;
            border: 2px solid #d4af77;
            border-radius: 50px;
            padding: 18px 36px;
            font-size: 1.15rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(212, 175, 119, 0.3);
        }

        .button:hover {
            background: rgba(212, 175, 119, 0.12);
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(212, 175, 119, 0.45);
        }

        .footer {
            margin-top: 70px;
            font-size: 0.95rem;
            opacity: 0.65;
            letter-spacing: 0.6px;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="https://raw.githubusercontent.com/theprinceecho/theprinceecho/main/TPE_Logo_final.JPG" 
             alt="ThePrinceEcho" class="logo">
    </div>
    
    <h1>ThePrinceEcho</h1>
    <p class="subtitle">The bridge for those who sense the urge.</p>
    
    <a href="https://x.com/theprinceecho" target="_blank" class="button">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18.244 2.25L15.25 8.5L22 15.75L15.5 15L18.244 2.25Z" fill="#d4af77"/>
            <path d="M6 2.25L9.5 15L3 15.75L9.5 8.5L6 2.25Z" fill="#d4af77"/>
        </svg>
        Visit on X →
    </a>
    
    <div class="footer">
        Sovereign landing page • The bridge
    </div>
</body>
</html>
