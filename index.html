<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ThePrinceEcho</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100dvh;
            min-height: 100dvh;
            min-height: -webkit-fill-available;
            background: #050505;
            color: #d4af77;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        .logo-container {
            margin-bottom: 36px;
        }

        .logo {
            width: 275px;
            height: 275px;
            border-radius: 24px;
            box-shadow: 0 0 75px rgba(212, 175, 119, 0.65);
        }

        h1, .subtitle, .footer {
            text-shadow: 
                0 2px 4px rgba(0,0,0,0.6),
                0 4px 8px rgba(0,0,0,0.4),
                2px 2px 0 rgba(255,255,255,0.1);
        }

        h1 {
            font-size: 2.85rem;
            font-weight: 600;
            margin: 20px 0 14px 0;
            letter-spacing: -1px;
            color: #f0d4a0;
        }

        .subtitle {
            font-size: 1.18rem;
            opacity: 0.92;
            max-width: 340px;
            margin: 0 auto 42px auto;
            line-height: 1.45;
            color: #e8c48f;
        }

        .button {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            background: transparent;
            color: #f0d4a0;
            border: 2px solid #f0d4a0;
            border-radius: 50px;
            padding: 18px 38px;
            font-size: 1.15rem;
            font-weight: 500;
            text-decoration: none;
            box-shadow: 
                0 6px 12px rgba(0,0,0,0.5),
                inset 0 2px 4px rgba(255,255,255,0.2),
                0 0 45px rgba(240, 212, 160, 0.55);
            transition: all 0.3s ease;
        }

        .button:hover {
            background: rgba(240, 212, 160, 0.12);
            box-shadow: 
                0 8px 16px rgba(0,0,0,0.6),
                inset 0 3px 6px rgba(255,255,255,0.25),
                0 0 60px rgba(240, 212, 160, 0.75);
            transform: translateY(-2px);
        }

        .button img {
            width: 26px;
            height: 26px;
        }

        .footer {
            margin-top: 70px;
            font-size: 0.95rem;
            opacity: 0.85;
            letter-spacing: 0.8px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #e8c48f;
        }

        .footer img {
            width: 22px;
            height: 22px;
            filter: brightness(1.3);
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="https://raw.githubusercontent.com/theprinceecho/theprinceecho/main/TPE_Logo_final.JPG" 
             alt="theprinceecho" class="logo">
    </div>
    
    <h1>ThePrinceEcho</h1>
    <p class="subtitle">The bridge for those who sense the urge.</p>
    
    <a href="https://x.com/theprinceecho" target="_blank" class="button">
        <img src="https://raw.githubusercontent.com/theprinceecho/theprinceecho/main/IMG_1126.jpg" 
             alt="X">
        @theprinceecho
    </a>
    
    <div class="footer">
        The sovereign landing page
        <img src="https://raw.githubusercontent.com/theprinceecho/theprinceecho/main/diamond_glow.JPG" 
             alt="Diamond">
        The sovereign bridge
    </div>
</body>
</html>
