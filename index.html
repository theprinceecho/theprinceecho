<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThePrinceEcho — The Bridge</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        :root {
            --bg: #0f0f0f;
            --gold: #d4af77;
        }
        
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: #e5e5e5;
            font-family: 'Inter', system-ui, sans-serif;
            line-height: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        
        .container {
            max-width: 720px;
            padding: 40px 20px;
        }
        
        .logo {
            width: 180px;
            height: 180px;
            margin: 0 auto 30px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(212, 175, 119, 0.3);
        }
        
        h1 {
            font-size: 2.8rem;
            font-weight: 600;
            color: var(--gold);
            margin-bottom: 16px;
        }
        
        p {
            font-size: 1.25rem;
            max-width: 520px;
            margin: 0 auto 40px;
            opacity: 0.9;
        }
        
        .x-link {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background-color: #1a1a1a;
            color: var(--gold);
            padding: 14px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .x-link:hover {
            background-color: #2a2a2a;
            transform: translateY(-2px);
        }
        
        .footer {
            margin-top: 80px;
            font-size: 0.9rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Replace the src with your actual lion+fox logo image URL after upload -->
        <img src="https://raw.githubusercontent.com/theprinceecho/theprinceecho/main/TPE_Logo_finalJPG" alt="ThePrinceEcho" class="logo">
        
        <h1>ThePrinceEcho</h1>
        <p>The bridge for those who sense the urge.</p>
        
        <a href="https://x.com/ThePrinceEcho" target="_blank" class="x-link">
            <span>Visit on X</span>
            <span>→</span>
        </a>
        
        <div class="footer">
            Sovereign landing page • The bridge
        </div>
    </div>
</body>
</html>
