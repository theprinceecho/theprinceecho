<!DOCTYPE html>

            padding: 0;
            width: 100%;
            min-height: 100vh;
            background: #050505;
            color: #d4af77;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(12px);

            z-index: 100;
            border-bottom: 1px solid rgba(212, 175, 119, 0.1);
        }
        
        .nav-logo {
            height: 32px;
            cursor: pointer;
        }
        
        .nav-links a {
            color: #d4af77;
            text-decoration: none;
            margin-left: 24px;
            font-weight: 500;
            font-size: 0.95rem;
        }
        
        .section {
            min-height: 100vh;
            padding: 100px 24px 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        h1 {
            font-size: 2.6rem;
            font-weight: 600;
            margin: 0 0 12px 0;
            letter-spacing: -1.3px;
        }
        
        .subtitle {
            font-size: 1.15rem;
            max-width: 420px;
            opacity: 0.9;
            margin-bottom: 40px;
            line-height: 1.5;
        }
        
        .tally-container {
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
        }
        
        .footer {
            margin-top: 60px;
            font-size: 0.9rem;
            opacity: 0.75;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .footer img {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="nav">
        <a href="index.html">
            <img src="https://raw.githubusercontent.com/theprinceecho/theprinceecho/main/TPE_Logo_final.JPG" alt="ThePrinceEcho" class="nav-logo">
        </a>
        
        <div class="nav-links">
            <a href="index.html#home">Home</a>
            <a href="index.html#about">About</a>

    <!-- Contact Section -->
    <section class="section">

                var d=document,w="https://tally.so/widgets/embed.js",v=function(){"undefined"!=typeof Tally?Tally.loadEmbeds():d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach((function(e){e.src=e.dataset.tallySrc}))};if("undefined"!=typeof Tally)v();else if(d.querySelector('script[src="'+w+'"]')==null){var s=d.createElement("script");s.src=w,s.onload=v,s.onerror=v,d.body.appendChild(s);}</script>

</body>
</html>
