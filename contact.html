<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ThePrinceEcho • Contact</title>
    <meta name="description" content="A direct line for those who sense the urge.">
    
    <link rel="canonical" href="https://theprinceecho.com/contact.html">
    <meta name="robots" content="index, follow">
    
    <meta property="og:title" content="ThePrinceEcho • Contact">
    <meta property="og:description" content="A direct line for those who sense the urge.">
    <meta property="og:url" content="https://theprinceecho.com/contact.html">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://raw.githubusercontent.com/theprinceecho/theprinceecho/main/TPE_Logo_final.webp">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preload" href="https://raw.githubusercontent.com/theprinceecho/theprinceecho/main/TPE_Logo_final.webp" as="image" type="image/webp" fetchpriority="high">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: #050505; 
            color: #d4af77; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }
        
        .nav { 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            height: 60px; 
            background: rgba(5,5,5,0.95); 
            backdrop-filter: blur(12px); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 24px; 
            z-index: 100; 
        }
        .nav-logo { 
            height: 32px; 
            cursor: pointer; 
        }
        .nav-links { 
            display: flex; 
            align-items: center; 
            gap: 28px; 
            font-size: 0.95rem; 
        }
        .nav-links a { 
            color: #ffffff;                 /* changed to white as requested */
            text-decoration: none; 
            font-weight: 500; 
            position: relative; 
            padding-bottom: 4px; 
        }
        .nav-links a.active::after { 
            content: ''; 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 2px; 
            background: #d4af77; 
            opacity: 0.85; 
        }
        
        .language-switcher { 
            position: relative; 
            cursor: pointer; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent; 
        }
        .current-lang { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            font-size: 1.35rem; 
            color: #ffffff; 
        }
        
        .hero-image {
            width: 100%;
            max-height: 380px;
            object-fit: cover;
            display: block;
            margin: 0 auto;
        }
        
        .contact-container {
            max-width: 720px;
            margin: 0 auto;
            padding: 100px 24px 120px;
            text-align: center;
        }
        
        h1 { 
            font-size: 2.8rem; 
            margin-bottom: 32px; 
            letter-spacing: -1.4px; 
            color: #d4af77; 
        }
        
        .subtitle-box {
            background: #111111;
            border: 1px solid rgba(212,175,119,0.3);
            border-radius: 12px;
            padding: 18px 32px;
            margin: 0 auto 60px;
            max-width: 520px;
            color: #ffffff;                    /* changed to white as requested */
            font-size: 1.15rem;
            line-height: 1.5;
        }
        
        .form-group {
            text-align: left;
            margin-bottom: 28px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: #d4af77;
            opacity: 0.9;
        }
        
        input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid rgba(212,175,119,0.3);
            border-radius: 8px;
            padding: 16px 20px;
            color: #ffffff;
            font-size: 1.05rem;
        }
        
        input:focus {
            outline: none;
            border-color: #d4af77;
            box-shadow: 0 0 0 3px rgba(212,175,119,0.2);
        }
        
        .required {
            color: #d4af77;
            margin-left: 4px;
        }
        
        .submit-btn {
            width: 100%;
            max-width: 280px;
            height: 62px;
            margin: 40px auto 0;
            background: rgba(212,175,119,0.08);
            color: #d4af77;
            border: 1px solid rgba(212,175,119,0.3);
            border-radius: 9999px;
            font-size: 1.12rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .submit-btn:hover {
            background: rgba(212,175,119,0.15);
            box-shadow: 0 0 65px rgba(212,175,119,0.6);
        }
        
        .footer { 
            margin-top: 80px; 
            text-align: center; 
            font-size: 0.9rem; 
            opacity: 0.75; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 12px; 
            line-height: 1.8; 
            padding: 0 24px; 
        }
        .footer a { 
            color: #d4af77 !important; 
            text-decoration: none; 
        }
    </style>
</head>
<body>

    <nav class="nav">
        <a href="index.html"><img src="https://raw.githubusercontent.com/theprinceecho/theprinceecho/main/TPE_Logo_final.webp" alt="ThePrinceEcho" class="nav-logo" width="32" height="32"></a>
        
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="index.html#about" class="active">About</a>
            <a href="index.html#recent-transmissions">Recent Transmissions</a>
            
            <div class="language-switcher">
                <span class="current-lang">🇺🇸 <span style="font-size:0.85rem; opacity:0.85;">US</span></span>
            </div>
        </div>
    </nav>

    <div class="contact-container">
        <h1>Contact</h1>
        
        <!-- Subtitle box – now white text -->
        <div class="subtitle-box">
            A direct line for those who sense the urge.
        </div>
        
        <!-- Hero banner matching screenshot -->
        <img src="https://raw.githubusercontent.com/theprinceecho/theprinceecho/main/contact-hero.jpg" 
             alt="ThePrinceEcho Temple" 
             class="hero-image">
        
        <!-- Form -->
        <div class="form-group">
            <label>Full Name <span class="required">*</span></label>
            <input type="text" placeholder="" required>
        </div>
        
        <div class="form-group">
            <label>E-Mail <span class="required">*</span></label>
            <input type="email" placeholder="" required>
        </div>
        
        <div class="form-group">
            <label>Phone <span class="required">*</span></label>
            <input type="tel" placeholder="">
        </div>
        
        <button type="submit" class="submit-btn">Send Transmission</button>
    </div>

    <div class="footer">
        <div>
            <span>The sovereign landing page</span>
            <span style="margin:0 12px;opacity:0.6">♦</span>
            <span>The sovereign bridge</span>
        </div>
        <div>
            <a href="index.html">Legal disclosure</a>
            <span style="margin:0 12px;opacity:0.6">•</span>
            <a href="contact.html">Contact</a>
        </div>
        <div style="font-size:0.85rem;opacity:0.6;margin-top:20px;">
            Copyright © 2026 ThePrinceEcho • All rights reserved.
        </div>
    </div>

</body>
</html>
